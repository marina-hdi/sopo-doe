<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — CREATION CONTRAT SOPODEX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1>CREATION CONTRAT SOPODEX</h1>
    <p class="auth-subtitle">Connexion sécurisée</p>

    <label>Email</label>
    <input id="login_email" type="email" placeholder="email" />

    <label>Mot de passe</label>
    <input id="login_password" type="password" placeholder="mot de passe" />

    <button id="loginBtn">Se connecter</button>

    <p id="authMessage"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>
</html>
