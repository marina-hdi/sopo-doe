<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi contrats — SOPODEX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>SOPODEX</h1>
      <span>Suivi contrats</span>
    </div>
    <nav class="topbar-nav">
      <a href="creation.html">Création</a>
      <a href="suivi.html" class="active">Suivi</a>
      <button id="logoutBtn" type="button">Déconnexion</button>
    </nav>
  </header>

  <main class="page">
    <div class="container">
      <div class="card">
        <h2>Suivi des contrats</h2>
        <button id="loadContracts" type="button">Charger les contrats</button>

        <div id="contractsTableWrapper" style="margin-top: 20px;">
          <p id="contractsEmpty">Aucun contrat chargé</p>

          <table id="contractsTable" style="display: none;">
            <thead>
              <tr>
                <th>Numéro</th>
                <th>Statut</th>
                <th>Immeuble</th>
                <th>Syndic</th>
                <th>Date relevé</th>
                <th>Combustible</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="contractsTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>Aperçu contrat</h2>
        <pre id="contractOutput">Aucun contrat sélectionné</pre>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
