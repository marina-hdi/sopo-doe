<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Création contrat — SOPODEX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>SOPODEX</h1>
      <span>Création contrat</span>
    </div>
    <nav class="topbar-nav">
      <a href="creation.html" class="active">Création</a>
      <a href="suivi.html">Suivi</a>
      <button id="logoutBtn" type="button">Déconnexion</button>
    </nav>
  </header>

  <main class="page">
    <div class="container">
      <div class="card">
        <h2>Importer un relevé chaufferie (CSV)</h2>
        <input type="file" id="csvFile" accept=".csv" />
      </div>

      <div class="card">
        <h2>Données détectées</h2>
        <pre id="csvPreview">Aucun fichier chargé</pre>
      </div>

      <div class="card">
        <h2>Formulaire contrat</h2>

        <label>Numéro contrat</label>
        <input id="numero_contrat" />

        <label>Adresse immeuble</label>
        <input id="adresse" />

        <label>Nom immeuble</label>
        <input id="nom_immeuble" />

        <label>Code postal</label>
        <input id="cp" />

        <label>Ville</label>
        <input id="ville" />

        <label>Date relevé</label>
        <input id="date" />

        <label>Syndic</label>
        <input id="syndic" />

        <label>Combustible</label>
        <input id="combustible" />

        <label>Type installation</label>
        <input id="installation" />

        <div class="button-row">
          <button id="createContract" type="button">Créer le contrat</button>
          <button id="downloadWord" type="button">Télécharger le contrat Word</button>
        </div>
      </div>

      <div class="card">
        <h2>Contrat généré</h2>
        <pre id="contractOutput">Aucun contrat généré</pre>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
